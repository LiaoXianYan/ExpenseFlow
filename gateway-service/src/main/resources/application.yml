server:
  port: 8080

spring:
  application:
    name: gateway-service
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: system-service
          uri: lb://system-service
          predicates:
            - Path=/system/**
          filters:
            - StripPrefix=0
        - id: expense-service
          uri: lb://expense-service
          predicates:
            - Path=/expense/**
          filters:
            - StripPrefix=0
        - id: approval-service
          uri: lb://approval-service
          predicates:
            - Path=/approval/**
          filters:
            - StripPrefix=0
        - id: ai-service
          uri: lb://ai-service
          predicates:
            - Path=/ai/**
          filters:
            - StripPrefix=0
        - id: notification-service
          uri: lb://notification-service
          predicates:
            - Path=/notification/**
          filters:
            - StripPrefix=0
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true
    sentinel:
      transport:
        port: 8719
      datasource:
        ds1:
          nacos:
            server-addr: localhost:8848
            data-id: gateway-sentinel-rules
            group-id: DEFAULT_GROUP
            data-type: json
            rule-type: gw-flow
  data:
    redis:
      host: localhost
      port: 6379

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  prometheus:
    metrics:
      export:
        enabled: true
