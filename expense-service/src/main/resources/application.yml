server:
  port: 8082

spring:
  application:
    name: expense-service
  config:
    import: "optional:nacos:${spring.application.name}.yaml"
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3307/expense_flow?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: root
    password: ${DB_PASSWORD:root}
    hikari:
      maximum-pool-size: 20
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
  data:
    redis:
      host: localhost
      port: 6379
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
      config:
        server-addr: localhost:8848
        file-extension: yaml
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

mybatis-plus:
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# ============================================================
# 阿里云 OCR 配置 — 已配置真实 AppCode 认证
# mock: false 启用真实 API，mock: true 降级 Mock
# ============================================================
expense:
  ocr:
    mock: false
    upload-path: ./upload/invoice
    app-code: ${OCR_APP_CODE:}
    app-key: ${OCR_APP_KEY:}
    app-secret: ${OCR_APP_SECRET:}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  prometheus:
    metrics:
      export:
        enabled: true
